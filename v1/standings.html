<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standings - APEX TRACKER</title>
    <meta name="description" content="Track Formula 1 races, results, and driver standings in a sleek, modern interface.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .standings-page {
            min-height: 100vh;
        }

        /* Floating GitHub Logo */
        .github-float {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 999;
            width: 60px;
            height: 60px;
            background-color: #15151e;
            border: 2px solid #e10600;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(225, 6, 0, 0.2);
            text-decoration: none;
        }

        .github-float:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(225, 6, 0, 0.4);
            background-color: #e10600;
        }

        .github-float svg {
            width: 32px;
            height: 32px;
            fill: #e10600;
            transition: fill 0.3s ease;
        }

        .github-float:hover svg {
            fill: #ffffff;
        }
    </style>
</head>
<body>
    <div class="disclaimer-banner">
        <p>Unofficial F1 Tracker | Not affiliated with Formula 1 companies | Developed by <a href="https://github.com/rssllssn" target="_blank">rssllssn</a></p>
    </div>
    <div class="app-container standings-page">
        <header class="main-header">
            <div class="logo">
                <h1>APEX<span>TRACKER</span></h1>
            </div>
            <nav>
                <a href="landing.html" class="nav-link">Home</a>
                <a href="races.html" class="nav-link">Races</a>
                <a href="standings.html" class="nav-link active-nav">Standings</a>
                <a href="drivers.html" class="nav-link">Drivers</a>
                <a href="teams.html" class="nav-link">Teams</a>
                <a href="privacy-policy.html" class="nav-link">Privacy</a>
                <a href="terms-of-service.html" class="nav-link">Terms</a>
            </nav>
        </header>

        <main class="content-area">
            <!-- Loader -->
            <div id="loader" class="loader active">
                <div class="spinner"></div>
                <p>Loading F1 Data...</p>
            </div>

            <!-- Standings View -->
            <section id="standings-view" class="view">
                <header class="view-header">
                    <h2>Driver Standings</h2>
                    <div class="season-selector">
                        <select id="season-select-standings">
                            <option value="current">Current Season</option>
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                        </select>
                    </div>
                </header>
                <div class="standings-list" id="standings-list"></div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        // Initialize for standings page
        document.addEventListener('DOMContentLoaded', () => {
            loadStandings('current');
            setupStandingsPageListeners();
        });

        function setupStandingsPageListeners() {
            const seasonSelect = document.getElementById('season-select-standings');
            seasonSelect.addEventListener('change', (e) => loadStandings(e.target.value));
        }
    </script>

    <a href="https://github.com/rssllssn" target="_blank" class="github-float" title="Visit GitHub">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

        </svg>
    </a>
</body>
</html>
