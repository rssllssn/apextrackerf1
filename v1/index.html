<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex - F1 Race Tracker</title>
    <meta name="description"
        content="Track Formula 1 races, results, and driver standings in a sleek, modern interface.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="disclaimer-banner">
        <p>Unofficial F1 Tracker | Not affiliated with Formula 1 companies | Developed by <a
                href="https://github.com/rssllssn" target="_blank">rssllssn</a></p>
    </div>
    <div class="app-container">
        <header class="main-header">
            <div class="logo">
                <h1>APEX<span>TRACKER</span></h1>
            </div>
            <nav>
                <button class="nav-btn active" data-view="races">Races</button>
                <button class="nav-btn" data-view="standings">Standings</button>
            </nav>
        </header>

        <main class="content-area">
            <!-- Loader -->
            <div id="loader" class="loader active">
                <div class="spinner"></div>
                <p>Loading F1 Data...</p>
            </div>

            <!-- Races View -->
            <section id="races-view" class="view hidden">
                <header class="view-header">
                    <h2>Season Races</h2>
                    <div class="season-selector">
                        <select id="season-select-races">
                            <option value="current">Current Season</option>
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                        </select>
                    </div>
                </header>
                <div class="grid" id="races-grid"></div>
            </section>

            <!-- Standings View -->
            <section id="standings-view" class="view hidden">
                <header class="view-header">
                    <h2>Driver Standings</h2>
                    <div class="season-selector">
                        <select id="season-select-standings">
                            <option value="current">Current Season</option>
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                        </select>
                    </div>
                </header>
                <div class="standings-list" id="standings-list"></div>
            </section>
        </main>
    </div>

    <!-- Race Details Modal -->
    <div id="race-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
