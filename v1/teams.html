<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Profiles - APEX TRACKER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #15151e;
            --surface: #ffffff;
            --surface-hover: #f4f4f4;
            --primary: #e10600;
            --primary-glow: rgba(225, 6, 0, 0.4);
            --text-main: #333333;
            --text-highlight: #15151e;
            --text-inverse: #ffffff;
            --border: #d0d0d2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--surface);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text-highlight);
            text-transform: uppercase;
            font-style: italic;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--primary);
            background-color: var(--bg-color);
            padding: 1rem 2rem;
            border-radius: 0 0 15px 15px;
            margin-top: -2rem;
        }

        .logo h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-inverse);
            margin: 0;
        }

        .logo span {
            color: var(--primary);
        }

        nav {
            display: flex;
            gap: 1.5rem;
        }

        .nav-link {
            color: var(--text-inverse);
            text-decoration: none;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background-color: var(--primary);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .nav-link:hover {
            color: var(--text-highlight);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link.active-nav {
            color: var(--primary);
        }

        .nav-link.active-nav::after {
            width: 100%;
        }

        /* Disclaimer banner */
        .disclaimer-banner {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: #0b0c10;
            padding: 0.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--primary);
        }

        .disclaimer-banner p {
            font-size: 0.75rem;
            color: #828282;
            margin: 0;
        }

        .disclaimer-banner a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .disclaimer-banner a:hover {
            text-decoration: underline;
        }

        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-top: 5px solid var(--bg-color);
            border-right: 5px solid var(--primary);
            border-top-right-radius: 15px;
            padding-top: 1rem;
            padding-right: 1rem;
        }

        .view-header h2 {
            font-size: 2.5rem;
            position: relative;
            padding-left: 0;
        }

        select {
            background-color: #f4f4f4;
            color: var(--text-highlight);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-bottom: 2px solid var(--primary);
            border-bottom-right-radius: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            outline: none;
            transition: background-color 0.3s ease;
        }

        select:focus {
            border-color: var(--primary);
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .season-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .season-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--text-inverse);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            transition: color 0.3s ease;
        }

        .season-btn::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background-color: var(--primary);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .season-btn:hover {
            color: var(--text-highlight);
        }

        .season-btn.active {
            color: var(--primary);
        }

        .season-btn.active::after {
            width: 100%;
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .team-card {
            background: var(--surface);
            border-top-right-radius: 15px;
            border-bottom-right-radius: 15px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-right: 5px solid var(--primary);
            border-top: 5px solid var(--bg-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }

        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .team-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .team-logo {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            background: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .team-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 5px;
        }

        .team-info h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            color: var(--text-highlight);
            margin-bottom: 3px;
        }

        .team-info p {
            font-size: 0.85rem;
            color: #999;
        }

        .team-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .detail {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            color: var(--primary);
            font-weight: 600;
        }

        .drivers-section h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            color: var(--text-highlight);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .drivers-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .driver-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(225, 6, 0, 0.05);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .driver-name {
            color: var(--text-main);
        }

        .driver-number {
            background: rgba(225, 6, 0, 0.1);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 3px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .error {
            background: rgba(225, 6, 0, 0.1);
            border: 1px solid var(--primary);
            border-radius: 8px;
            padding: 20px;
            color: var(--primary);
            text-align: center;
            margin: 20px 0;
        }

        .team-color-bar {
            height: 4px;
            background: var(--primary);
            border-radius: 2px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .main-header {
                flex-direction: column;
                gap: 1rem;
                border-radius: 0;
                margin-top: 0;
            }

            .logo h1 {
                font-size: 1.8rem;
            }

            nav {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }

            .view-header h2 {
                font-size: 1.8rem;
            }
        }

        /* Floating GitHub Logo */
        .github-float {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 999;
            width: 60px;
            height: 60px;
            background-color: var(--bg-color);
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(225, 6, 0, 0.2);
            text-decoration: none;
        }

        .github-float:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(225, 6, 0, 0.4);
            background-color: var(--primary);
        }

        .github-float svg {
            width: 32px;
            height: 32px;
            fill: var(--primary);
            transition: fill 0.3s ease;
        }

        .github-float:hover svg {
            fill: var(--text-inverse);
        }
    </style>
</head>
<body>
    <div class="disclaimer-banner">
        <p>Unofficial F1 Tracker | Not affiliated with Formula 1 companies | Developed by <a href="https://github.com/rssllssn" target="_blank">rssllssn</a></p>
    </div>
    <div class="app-container">
        <header class="main-header">
            <div class="logo">
                <h1>APEX<span>TRACKER</span></h1>
            </div>
            <nav>
                <a href="landing.html" class="nav-link">Home</a>
                <a href="races.html" class="nav-link">Races</a>
                <a href="standings.html" class="nav-link">Standings</a>
                <a href="drivers.html" class="nav-link">Drivers</a>
                <a href="teams.html" class="nav-link active-nav">Teams</a>
                <a href="privacy-policy.html" class="nav-link">Privacy</a>
                <a href="terms-of-service.html" class="nav-link">Terms</a>
            </nav>
        </header>

        <section class="view-header">
            <h2>Team Profiles</h2>
        </section>

        <div class="season-selector" id="seasonSelector"></div>

        <div class="teams-grid" id="teamsGrid">
            <div class="loading">Loading teams...</div>
        </div>
    </div>
    </div>

    <a href="https://github.com/rssllssn" target="_blank" class="github-float" title="Visit GitHub">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
    </a>

    <script>
        const CACHE_KEY = 'teams_cache';
        const CACHE_TTL = 7 * 24 * 60 * 60 * 1000; // 7 days

        let currentSeason = new Date().getFullYear();
        let teamsData = {};
        let driversData = {};

        const seasons = [2023, 2024, 2025];

        const teamLogos = {
            'Alpine': 'alpine.png',
            'Aston Martin': 'aston-martin.png',
            'Audi': 'audi.png',
            'Cadillac': 'cadillac.png',
            'Ferrari': 'ferrari.png',
            'Haas': 'haas.png',
            'McLaren': 'mclaren.png',
            'Mercedes': 'mercedes.png',
            'Racing Bulls': 'rb.png',
            'Red Bull': 'red-bull.png',
            'Williams': 'williams.png'
        };

        function initializeUI() {
            renderSeasonSelector();
        }

        function renderSeasonSelector() {
            const selector = document.getElementById('seasonSelector');
            selector.innerHTML = seasons.map(season => `
                <button class="season-btn ${season === currentSeason ? 'active' : ''}" 
                        onclick="selectSeason(${season})">
                    ${season}
                </button>
            `).join('');
        }

        function selectSeason(season) {
            currentSeason = season;
            loadTeams();
        }

        async function loadTeams() {
            const grid = document.getElementById('teamsGrid');
            grid.innerHTML = '<div class="loading">Loading teams...</div>';

            try {
                const cacheKey = `${CACHE_KEY}_${currentSeason}`;
                const cached = localStorage.getItem(cacheKey);
                const cacheTime = localStorage.getItem(`${cacheKey}_time`);

                if (cached && cacheTime && Date.now() - parseInt(cacheTime) < CACHE_TTL) {
                    teamsData = JSON.parse(cached);
                    await loadDriversForTeams();
                    renderTeams();
                    return;
                }

                const response = await fetch(`https://api.jolpi.ca/ergast/f1/${currentSeason}/constructors.json`);
                const data = await response.json();

                if (data.MRData && data.MRData.ConstructorTable && data.MRData.ConstructorTable.Constructors) {
                    teamsData = data.MRData.ConstructorTable.Constructors;
                    localStorage.setItem(cacheKey, JSON.stringify(teamsData));
                    localStorage.setItem(`${cacheKey}_time`, Date.now().toString());
                    await loadDriversForTeams();
                    renderTeams();
                } else {
                    grid.innerHTML = '<div class="error">No teams found for this season.</div>';
                }
            } catch (error) {
                console.error('Error loading teams:', error);
                grid.innerHTML = '<div class="error">Failed to load teams. Please try again later.</div>';
            }
        }

        async function loadDriversForTeams() {
            try {
                const driversCacheKey = `drivers_cache_${currentSeason}`;
                const cached = localStorage.getItem(driversCacheKey);
                const cacheTime = localStorage.getItem(`${driversCacheKey}_time`);

                if (cached && cacheTime && Date.now() - parseInt(cacheTime) < CACHE_TTL) {
                    driversData = JSON.parse(cached);
                    return;
                }

                const response = await fetch(`https://api.jolpi.ca/ergast/f1/${currentSeason}/drivers.json`);
                const data = await response.json();

                if (data.MRData && data.MRData.DriverTable && data.MRData.DriverTable.Drivers) {
                    driversData = data.MRData.DriverTable.Drivers;
                    localStorage.setItem(driversCacheKey, JSON.stringify(driversData));
                    localStorage.setItem(`${driversCacheKey}_time`, Date.now().toString());
                }
            } catch (error) {
                console.error('Error loading drivers:', error);
            }
        }

        function getTeamDrivers(teamName) {
            return driversData.filter(d => d.Constructors?.[0]?.name === teamName);
        }

        function renderTeams() {
            const grid = document.getElementById('teamsGrid');

            if (teamsData.length === 0) {
                grid.innerHTML = '<div class="error">No teams found for this season.</div>';
                return;
            }

            grid.innerHTML = teamsData.map(team => {
                const drivers = getTeamDrivers(team.name);
                const logoFile = teamLogos[team.name] || null;

                return `
                    <div class="team-card">
                        <div class="team-color-bar"></div>
                        <div class="team-header">
                            ${logoFile ? `
                                <div class="team-logo">
                                    <img src="images/${logoFile}" alt="${team.name}" onerror="this.style.display='none'">
                                </div>
                            ` : ''}
                            <div class="team-info">
                                <h2>${team.name}</h2>
                                <p>${team.nationality}</p>
                            </div>
                        </div>

                        <div class="team-details">
                            <div class="detail">
                                <div class="detail-label">Constructor ID</div>
                                <div class="detail-value">${team.constructorId}</div>
                            </div>
                            <div class="detail">
                                <div class="detail-label">Drivers</div>
                                <div class="detail-value">${drivers.length}</div>
                            </div>
                        </div>

                        ${drivers.length > 0 ? `
                            <div class="drivers-section">
                                <h3>Current Drivers</h3>
                                <div class="drivers-list">
                                    ${drivers.map(driver => `
                                        <div class="driver-item">
                                            <span class="driver-name">${driver.givenName} ${driver.familyName}</span>
                                            <span class="driver-number">#${driver.permanentNumber || '—'}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeUI();
            loadTeams();
        });
    </script>
</body>
</html>
